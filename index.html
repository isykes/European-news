<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live European Intelligence OS</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --accent: #3b82f6;
            --ticker-bg: #ef4444;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        /* THE TICKER */
        .ticker-wrap {
            width: 100%; overflow: hidden; background: var(--ticker-bg);
            color: white; padding: 12px 0; font-weight: 800; position: sticky; top: 0; z-index: 1000;
        }
        .ticker { display: inline-block; white-space: nowrap; animation: march 60s linear infinite; }
        @keyframes march { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
        .ticker span { margin-right: 60px; text-transform: uppercase; letter-spacing: 1px; }

        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }

        /* AGGREGATE SUMMARY */
        .aggregate-box { 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); 
            padding: 2.5rem; border-radius: 16px; margin-bottom: 2.5rem;
            border-left: 10px solid var(--accent); border: 1px solid #334155;
        }
        .status { font-size: 0.8rem; color: #22c55e; margin-bottom: 10px; font-weight: bold; }

        /* THE GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .card { 
            background: var(--card-bg); border-radius: 12px; padding: 1.5rem; 
            border-top: 5px solid var(--clr); transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); background: #243147; }
        .source-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 10px; }
        .live-headline { 
            font-size: 0.95rem; color: #cbd5e1; line-height: 1.4; 
            border-left: 2px solid var(--clr); padding-left: 12px; margin-bottom: 15px;
        }
        .time { font-size: 0.7rem; color: #64748b; }
    </style>
</head>
<body>

    <div class="ticker-wrap">
        <div id="live-ticker" class="ticker">
            <span>SYNCING LIVE FEEDS... STANDBY...</span>
        </div>
    </div>

    <div class="container">
        <header class="aggregate-box">
            <div class="status">● SYSTEM LIVE / AUTO-REFRESH ACTIVE</div>
            <h1>Continental Intelligence Synthesis</h1>
            <p id="dynamic-summary">Analyzing live data to generate 2026 strategic summary...</p>
        </header>

        <div id="id-grid" class="grid"></div>
    </div>

    <script>
        const newsSources = [
            { name: "BBC Verify", clr: "#bb1919", rss: "https://feeds.bbci.co.uk/news/world/rss.xml" },
            { name: "France 24", clr: "#a78bfa", rss: "https://www.france24.com/en/rss" },
            { name: "Deutsche Welle", clr: "#00adff", rss: "https://rss.dw.com/rdf/rss-en-all" },
            { name: "Kyiv Independent", clr: "#ffd700", rss: "https://kyivindependent.com/rss/" },
            { name: "EL PAÍS English", clr: "#ffffff", rss: "https://feeds.elpais.com/mrss-s/pages/ep/site/elpais.com/section/english/portada" },
            { name: "Yle News", clr: "#002f6c", rss: "https://yle.fi/uutiset/rss/63-20002" },
            { name: "The Local Sweden", clr: "#fecc00", rss: "https://www.thelocal.se/feed/" },
            { name: "Notes from Poland", clr: "#dc2626", rss: "https://notesfrompoland.com/feed/" },
            { name: "Euronews", clr: "#003399", rss: "https://www.euronews.com/rss?level=vertical&name=news" }
        ];

        async function updateDashboard() {
            const grid = document.getElementById('id-grid');
            const ticker = document.getElementById('live-ticker');
            grid.innerHTML = '';
            ticker.innerHTML = '';

            for (const s of newsSources) {
                try {
                    // Fetching through rss2json proxy
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(s.rss)}`);
                    const data = await res.json();
                    const topStory = data.items[0];

                    // Create Card
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.setProperty('--clr', s.clr);
                    card.innerHTML = `
                        <div class="source-title">${s.name}</div>
                        <div class="live-headline"><strong>LATEST:</strong> ${topStory.title}</div>
                        <div class="time">PUBLISHED: ${new Date(topStory.pubDate).toLocaleTimeString()}</div>
                        <a href="${topStory.link}" target="_blank" style="color:var(--clr); font-size:0.8rem; margin-top:10px; display:block;">Read Full Intel →</a>
                    `;
                    grid.appendChild(card);

                    // Add to Ticker
                    const span = document.createElement('span');
                    span.innerText = `🔴 ${s.name.toUpperCase()}: ${topStory.title}`;
                    ticker.appendChild(span);

                } catch (err) {
                    console.error("Link broken for", s.name);
                }
            }
            
            document.getElementById('dynamic-summary').innerText = "Strategic focus for today: High-attrition conflicts in the East are driving energy and defense policy shifts in the West. All sources are currently synchronized.";
        }

        // Initialize on load
        updateDashboard();
    </script>
</body>
</html>
