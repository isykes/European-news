<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EU Strategic Command | Static Sync</title>
    <style>
        :root { --bg: #020617; --card: #0f172a; --text: #f1f5f9; --accent: #3b82f6; --border: #1e293b; --red: #7f1d1d; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        .top-bar { display: grid; grid-template-columns: 1fr 180px; background: var(--red); position: sticky; top: 0; z-index: 1000; align-items: center; }
        .ticker-wrap { overflow: hidden; padding: 10px 0; }
        .ticker { display: inline-block; white-space: nowrap; animation: march 80s linear infinite; }
        @keyframes march { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
        .ticker span { margin-right: 60px; text-transform: uppercase; font-size: 0.8rem; font-weight: 800; }
        .clock { background: rgba(0,0,0,0.4); padding: 10px; text-align: center; font-family: monospace; font-size: 1rem; }
        .container { max-width: 1450px; margin: 0 auto; padding: 1.5rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 8px; padding: 1.2rem; border-top: 4px solid var(--clr); border: 1px solid var(--border); }
        .title { font-size: 1.2rem; font-weight: 800; margin-bottom: 12px; color: #fff; }
        .item { margin-bottom: 10px; padding-left: 10px; border-left: 2px solid #334155; font-size: 0.85rem; }
        .link { text-decoration: none; color: #cbd5e1; display: block; line-height: 1.4; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="ticker-wrap"><div id="ticker" class="ticker"><span>SECURE SERVER-SIDE SYNC ACTIVE... MARCH 20, 2026...</span></div></div>
    <div id="clock" class="clock">00:00:00</div>
</div>

<div class="container">
    <div id="grid" class="grid"></div>
</div>

<script>
    // Update Clock
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour12: false}); }, 1000);

    // Source Metadata
    const config = {
        "BBC News": { clr: "#bb1919" },
        "France 24": { clr: "#a78bfa" },
        "DW.com": { clr: "#00adff" },
        "The Kyiv Independent": { clr: "#ffd700" },
        "EL PAÍS English": { clr: "#ffffff" },
        "Yle Uutiset": { clr: "#002f6c" },
        "The Local Sweden": { clr: "#fecc00" },
        "Notes from Poland": { clr: "#dc2626" },
        "Euronews": { clr: "#003399" }
    };

    async function loadData() {
        try {
            // This fetches the JSON file generated by your GitHub Action
            const res = await fetch('news.json');
            const data = await res.json();
            const grid = document.getElementById('grid');
            
            data.feeds.forEach(feed => {
                const card = document.createElement('div');
                card.className = 'card';
                const sourceMeta = config[feed.title] || { clr: "#3b82f6" };
                card.style.setProperty('--clr', sourceMeta.clr);
                
                let html = `<div class="title">${feed.title}</div>`;
                feed.items.slice(0, 3).forEach(item => {
                    html += `<div class="item"><a href="${item.link}" target="_blank" class="link">${item.title}</a></div>`;
                });
                card.innerHTML = html;
                grid.appendChild(card);
            });
        } catch (e) {
            document.body.innerHTML += "<p style='text-align:center'>Waiting for first sync... Check GitHub Actions tab.</p>";
        }
    }
    loadData();
</script>
</body>
</html>
